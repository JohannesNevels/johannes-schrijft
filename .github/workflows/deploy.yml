name: Deploy naar GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Rechten die GitHub Pages nodig heeft.
permissions:
  contents: read
  pages: write
  id-token: write

# Eén deploy tegelijk; nieuwere pushes annuleren lopende runs niet halverwege.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Bouw de site
        # TIJDELIJK: preview op https://johannesnevels.github.io/johannes-schrijft/
        # zolang versregel.nl nog niet resolvet. Zodra de DNS werkt: deze env
        # weghalen (root-build) én src/static/CNAME (versregel.nl) terugzetten.
        env:
          PATH_PREFIX: "/johannes-schrijft/"
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
